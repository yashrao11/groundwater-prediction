<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groundwater Level Prediction System</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        h1, h2 { text-align: center; }
        input[type="text"] { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; border: none; border-radius: 5px; background-color: #007BFF; color: white; cursor: pointer; width: 100%; }
        button:hover { background-color: #0056b3; }
        .forecast, .flowchart { margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; }
        table, th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Groundwater Level Prediction System</h1>
        <h2>Forecast Next 5 Years for Your Station</h2>
        <form method="post" action="/predict">
            <label for="station">Enter Exact Station Name:</label>
            <input type="text" id="station" name="station" placeholder="e.g., 14N01E35P004M" required>
            <button type="submit">Predict</button>
        </form>

        {% if forecast_data %}
            <div class="forecast">
                <h3>Forecast Data</h3>
                {{ forecast_data | safe }}
            </div>
        {% endif %}

        {% if graph_img %}
            <div class="forecast">
                <h3>Historical and Forecast Graph</h3>
                <img src="data:image/png;base64,{{ graph_img }}" alt="Forecast Graph" style="max-width:100%;">
            </div>
        {% endif %}

        {% if flowchart %}
            <div class="flowchart">
                <h3>Flowchart</h3>
                <pre>{{ flowchart }}</pre>
            </div>
        {% endif %}
    </div>
</body>
</html>
